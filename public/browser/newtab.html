<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1a1a;
        color: #d4c5a9;
        font-family: "VT323", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 28px;
      }
      h1 {
        font-size: 48px;
        letter-spacing: 0.1em;
        color: #e8472a;
      }
      p {
        font-size: 18px;
        color: #8a7e6a;
        font-family: "Courier Prime", monospace;
      }
      .search-row {
        display: flex;
        border: 2px solid #d4c5a9;
        box-shadow: 3px 3px 0 #d4c5a9;
      }
      input {
        background: #1a1a1a;
        border: none;
        color: #d4c5a9;
        font-family: "Courier Prime", monospace;
        font-size: 16px;
        padding: 8px 14px;
        width: 340px;
        outline: none;
      }
      button {
        background: #e8472a;
        border: none;
        border-left: 2px solid #d4c5a9;
        color: #d4c5a9;
        font-family: "VT323", monospace;
        font-size: 22px;
        padding: 4px 18px;
        cursor: pointer;
        letter-spacing: 0.05em;
      }
      button:hover {
        background: #c73d23;
      }
    </style>
  </head>
  <body>
    <h1>BROWSER.EXE</h1>
    <p>Enter a URL or search query.</p>
    <form class="search-row" onsubmit="navigate(event)">
      <input id="q" type="text" placeholder="https:// or search..." autofocus />
      <button type="submit">GO</button>
    </form>
    <script>
      function navigate(e) {
        e.preventDefault();
        var val = document.getElementById("q").value.trim();
        if (!val) return;
        window.parent.postMessage(
          { type: "browser-navigate", value: val },
          "*",
        );
      }
    </script>
  </body>
</html>
